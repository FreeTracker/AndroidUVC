name: Android CI & Release

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        # Store secret in env to check its existence in 'if'
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        if: success() && env.SIGNING_KEY != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Upload Signed APK to Artifacts
        uses: actions/upload-artifact@v4
        if: success() && steps.sign_app.outputs.signedReleaseFile != ''
        with:
          name: release-apk-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Upload Unsigned APK to Artifacts (Alternative)
        if: always() && (steps.sign_app.outcome == 'skipped' || steps.sign_app.outputs.signedReleaseFile == '')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            app/build/outputs/apk/release/*-unsigned.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
