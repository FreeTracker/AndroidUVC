name: Android CI with Signing

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        # Only run if the secret is present to avoid failure on missing secrets
        if: success() && secrets.SIGNING_KEY != null
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          # Use a version that exists on the runner
          buildToolsVersion: "34.0.0"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        if: success() && steps.sign_app.outputs.signedReleaseFile != ''
        with:
          name: release-apk-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      # Fallback if signing is not configured (will upload unsigned if secrets missing)
      - name: Upload Unsigned APK (Alternative)
        if: always() && (steps.sign_app.outcome == 'skipped' || steps.sign_app.outputs.signedReleaseFile == '')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
